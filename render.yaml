# ─────────────────────────────────────────────────────────────────────────────
# ShopCart Co. — Render deployment config
# Place at REPO ROOT. Set sync:false vars in the Render dashboard.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend API ───────────────────────────────────────────────────────────
  - type: web
    name: shopcart-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      - key: MONGODB_URI
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false

      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_CURRENCY
        value: INR

      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

      # Set this AFTER frontend is deployed
      - key: FRONTEND_URL
        sync: false       # e.g. https://shopcart-app.onrender.com

  # ── Frontend Static Site ──────────────────────────────────────────────────
  - type: web
    name: shopcart-app
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist          # Vite outputs to dist, not build
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # Fixes 404 on page refresh for React Router
    envVars:
      # Set AFTER backend is deployed:
      - key: VITE_API_BASE_URL
        sync: false                  # e.g. https://shopcart-api.onrender.com
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false                  # pk_test_... or pk_live_...
